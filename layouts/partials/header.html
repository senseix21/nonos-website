<header class="header">

    <a href="/" class="logo" aria-label="NØNOS Home">
      <img src="/images/logo-nonos.svg" alt="NØNOS" class="logo-img" height="28">
    </a>
    <nav class="nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}

    </nav>
  </div>
